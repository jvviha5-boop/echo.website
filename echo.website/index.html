<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - 我的 AI 作品展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .intro {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .project-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .project-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .project-card p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .ml-demo {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4f8;
            border-radius: 5px;
            color: #333;
            display: none;
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Echo AI</h1>
        
        <div class="intro">
            <p>欢迎来到我的人工智能项目展示平台！</p>
            <p>这里展示我在机器学习领域的一些研究和实验。</p>
        </div>
        
        <h2 style="color: #667eea; margin: 20px 0;">📚 我的项目</h2>
        
        <div class="projects">
            <div class="project-card">
                <h3>项目 1：图片分类</h3>
                <p>使用 CNN 进行图片分类，准确率 95%+</p>
            </div>
            <div class="project-card">
                <h3>项目 2：NLP 文本分析</h3>
                <p>基于 BERT 的文本情感分析模型</p>
            </div>
            <div class="project-card">
                <h3>项目 3：时间序列预测</h3>
                <p>LSTM 网络用于股票价格预测</p>
            </div>
        </div>
        
        <div class="ml-demo">
            <h3>🧪 在线演示：简单的数字识别</h3>
            <div class="input-group">
                <label>输入数字 (0-100)：</label><br>
                <input type="number" id="inputNum" placeholder="输入一个数字" min="0" max="100">
            </div>
            <button onclick="predictML()">预测</button>
            <div id="result" class="result"></div>
        </div>
        
        <footer>
            <p>© 2026 Echo AI | 用代码探索人工智能的可能性</p>
        </footer>
    </div>
    
    <script>
        function predictML() {
            const input = document.getElementById('inputNum').value;
            const resultDiv = document.getElementById('result');
            
            if (!input) {
                alert('请输入一个数字！');
                return;
            }
            
            const num = parseInt(input);
            let prediction = '';
            
            if (num < 33) {
                prediction = '预测：小数值 📉';
            } else if (num < 67) {
                prediction = '预测：中等数值 📊';
            } else {
                prediction = '预测：大数值 📈';
            }
            
            resultDiv.textContent = `输入: ${num} | ${prediction}`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
